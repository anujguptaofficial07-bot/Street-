name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Unzip Android project
        run: |
          ZIP_FILE=$(ls *.zip | head -n 1)
          echo "Using ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          PROJECT_DIR=$(find extracted -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project found at: $PROJECT_DIR"

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          chmod +x ./gradlew || true
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StreetLens360-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
